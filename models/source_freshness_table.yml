version: 2

sources:
  - name: aitbnb
    schema: raw

    tables:
      - name: source_freshness_table
        freshness:
          error_after:
            count: 20
            period: minute
          warn_after:
            count: 10
            period: minute
        loaded_at_field: "convert_timezone('America/Los_Angeles', 'UTC', created_at)" 